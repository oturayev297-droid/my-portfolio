services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: masterdev
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ozodbek12345678}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterdev -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_NAME: portfolio
      DB_USER: masterdev
      DB_PASSWORD: ${DB_PASSWORD:-ozodbek12345678}
      DJANGO_SETTINGS_MODULE: config.settings
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume:
